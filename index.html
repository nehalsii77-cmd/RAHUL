<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEHAL CLOUD 3.0 | PREMIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f5a0;
            --secondary: #00d9f5;
            --accent: #7000ff;
            --bg-dark: #020205;
            --card-bg: rgba(255, 255, 255, 0.1);
            --border-glow: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --success: #00ff9d;
            --error: #ff3366;
            --panel-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: url('https://i.postimg.cc/9fzYZvz4/IMG-20260218-WA0000.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            padding: 15px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header Styling */
        .header {
            text-align: center;
            padding: 40px 0 20px;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, #a0f1ff, #ffb0eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .header p {
            color: #fff;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Horizontal Stats Bar */
        .stats-strip {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 25px 40px;
            margin: 30px 0;
            backdrop-filter: blur(20px);
            box-shadow: var(--panel-shadow);
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-icon-mini {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stat-content h4 {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.9);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .stat-value-mini {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Engine Status Indicator */
        .engine-status-bar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 10px 25px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            backdrop-filter: blur(10px);
        }

        .status-pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: relative;
        }

        .status-pulse.online { background: #00ffcc; box-shadow: 0 0 20px #00ffcc; }
        .status-pulse.offline { background: #ff4d4d; box-shadow: 0 0 20px #ff4d4d; }

        .status-text {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
        }

        /* Layout Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 950px) {
            .main-grid { grid-template-columns: 1fr; }
            .stats-strip { justify-content: center; padding: 25px; }
        }

        /* Cyberpunk Cards - Liquid Glass Style */
        .cyber-card {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 32px;
            padding: 35px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(25px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .cyber-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .card-header i { font-size: 1.6rem; color: #fff; }
        .card-header h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; color: #fff; font-weight: 700; }

        /* Advanced Form Fields */
        .input-box {
            margin-bottom: 25px;
        }

        .input-box label {
            display: block;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .cyber-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            padding: 16px 22px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .cyber-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.1);
        }

        .cyber-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Advanced Buttons - Liquid Glass Style */
        .cyber-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .btn-glow-primary {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-glow-primary:hover {
            background: #fff;
            color: #000;
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.3);
        }

        .btn-outline-danger {
            background: rgba(255, 77, 77, 0.15);
            border: 1px solid rgba(255, 77, 77, 0.4);
            color: #fff;
            margin-top: 15px;
            backdrop-filter: blur(10px);
        }

        .btn-outline-danger:hover {
            background: #ff4d4d;
            border-color: #ff4d4d;
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.4);
        }

        /* Enhanced Terminal Feed - Liquid Glass */
        .terminal-container {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
            height: 100%;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .terminal-header {
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .terminal-dots { display: flex; gap: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .red { background: #ff5f56; box-shadow: 0 0 10px #ff5f56; }
        .yellow { background: #ffbd2e; box-shadow: 0 0 10px #ffbd2e; }
        .green { background: #27c93f; box-shadow: 0 0 10px #27c93f; }

        .terminal-body {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #fff;
        }

        .log-line { 
            margin-bottom: 10px; 
            display: flex; 
            gap: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            padding-bottom: 5px;
            word-break: break-all;
            align-items: flex-start;
        }
        .time { color: #a0f1ff; opacity: 0.8; flex-shrink: 0; white-space: nowrap; }
        .tag { color: #fff; font-weight: bold; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
        .log-content { flex: 1; }

        .hidden { display: none !important; }

        /* Future Feature Tags */
        .feature-tag {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 800;
            border: 1px solid rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NEHAL CLOUD 3.0</h1>
        <p>Quantum Meta-Automation Engine v4.0</p>
    </div>

    <div class="engine-status-bar">
        <span class="status-pulse offline" id="statusDot"></span>
        <span class="status-text" id="statusText">System Initializing...</span>
    </div>

    <div class="stats-strip">
        <div class="stat-item">
            <div class="stat-icon-mini"><i class="fas fa-microchip"></i></div>
            <div class="stat-content">
                <h4>System Uptime</h4>
                <div class="stat-value-mini" id="uptimeValue">00:00:00</div>
            </div>
        </div>
        <div class="stat-item">
            <div class="stat-icon-mini"><i class="fas fa-project-diagram"></i></div>
            <div class="stat-content">
                <h4>Active Engines</h4>
                <div class="stat-value-mini" id="activeTasks">0</div>
            </div>
        </div>
        <div class="stat-item">
            <div class="stat-icon-mini"><i class="fas fa-satellite-dish"></i></div>
            <div class="stat-content">
                <h4>Packets Sent</h4>
                <div class="stat-value-mini" id="sent">0</div>
            </div>
        </div>
    </div>

    <div class="main-grid">
        <div class="control-panel">
            <div class="cyber-card">
                <div class="card-header">
                    <i class="fas fa-sliders"></i>
                    <h2>Engine Parameters</h2>
                    <span class="feature-tag">AUTO-ROTATION</span>
                </div>

                <div class="input-box">
                    <label>Injection Method</label>
                    <select class="cyber-input" id="cookieMethod" onchange="toggleCookieInput()">
                        <option value="file">Local Cookie Vault (.txt)</option>
                        <option value="paste">Direct Session Stream</option>
                    </select>
                </div>

                <div class="input-box" id="fileInputArea">
                    <label>Auth Tokens (.txt)</label>
                    <input type="file" class="cyber-input" id="cookieFile" accept=".txt">
                </div>

                <div class="input-box hidden" id="pasteInputArea">
                    <label>Session Data</label>
                    <textarea class="cyber-input" id="cookieText" style="height: 100px;" placeholder="Paste session cookies here..."></textarea>
                </div>

                <div class="input-box">
                    <label>Payload Script (.txt)</label>
                    <input type="file" class="cyber-input" id="msg" accept=".txt">
                </div>

                <div class="form-row">
                    <div class="input-box">
                        <label>Target ID</label>
                        <input type="text" class="cyber-input" id="thread" placeholder="Thread UUID">
                    </div>
                    <div class="input-box">
                        <label>Pulse Interval (s)</label>
                        <input type="number" class="cyber-input" id="delay" value="10" min="1">
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-box">
                        <label>Prefix Identity</label>
                        <input type="text" class="cyber-input" id="haters" placeholder="Hatername">
                    </div>
                    <div class="input-box">
                        <label>Suffix Identity</label>
                        <input type="text" class="cyber-input" id="last" placeholder="Suffix 1, ">
                    </div>
                </div>

                <button class="cyber-btn btn-glow-primary" id="startBtn">
                    <i class="fas fa-bolt"></i>
                    <span>DEPLOY ENGINE</span>
                </button>

                <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px;">
                    <div class="card-header" style="margin-bottom: 15px;">
                        <i class="fas fa-shield-virus"></i>
                        <h2>Fail-Safe Protocol</h2>
                    </div>
                    <input type="text" class="cyber-input" id="taskIdInput" placeholder="Active Process ID">
                    <button class="cyber-btn btn-outline-danger" id="stopBtn">TERMINATE LINK</button>
                </div>
            </div>
        </div>

        <div class="monitor-panel">
            <div class="terminal-container">
                <div class="terminal-header">
                    <div class="terminal-dots">
                        <div class="dot red"></div>
                        <div class="dot yellow"></div>
                        <div class="dot green"></div>
                    </div>
                    <span style="font-size: 0.65rem; color: #fff; letter-spacing: 2px; font-weight: bold;">NEHAL_SYS_LOG</span>
                </div>
                <div class="terminal-body" id="log"></div>
            </div>
            
            <div class="cyber-card" style="margin-top: 25px; padding: 20px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i class="fas fa-info-circle" style="color: #fff;"></i>
                    <p style="font-size: 0.8rem; color: #fff;">
                        <strong>Tip:</strong> Use multi-cookie rotation for higher stealth and stability.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let ws;
const logBox = document.getElementById("log");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");

function log(msg) {
    const time = new Date().toLocaleTimeString('en-US', { hour12: false });
    const isError = msg.includes("failed") || msg.includes("Stop") || msg.includes("Invalid");
    const isSuccess = msg.includes("ready") || msg.includes("sent") || msg.includes("started");
    
    let color = "#fff";
    if (isError) color = "#ff4d4d";
    if (isSuccess) color = "#00ffcc";

    logBox.innerHTML += `
        <div class="log-line">
            <span class="time">[${time}]</span>
            <span class="tag">NEHAL_SYS</span>
            <span class="log-content" style="color: ${color}">${msg}</span>
        </div>`;
    logBox.scrollTop = logBox.scrollHeight;
}

function setOnline(online) {
    if (online) {
        statusDot.className = "status-pulse online";
        statusText.textContent = "CORE SYSTEM STABLE";
        statusText.style.color = "#00ffcc";
    } else {
        statusDot.className = "status-pulse offline";
        statusText.textContent = "CORE LINK SEVERED";
        statusText.style.color = "#ff4d4d";
    }
}

function toggleCookieInput() {
    const m = document.getElementById("cookieMethod").value;
    document.getElementById("fileInputArea").classList.toggle("hidden", m !== "file");
    document.getElementById("pasteInputArea").classList.toggle("hidden", m !== "paste");
}

function connect() {
    ws = new WebSocket((location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws");

    ws.onopen = () => {
        setOnline(true);
        log("Connection established. Sub-systems ready.");
    };

    ws.onclose = () => {
        setOnline(false);
        log("Link failure detected. Re-establishing connection...");
        setTimeout(connect, 3000);
    };

    ws.onmessage = (e) => {
        let d;
        try { d = JSON.parse(e.data); } catch { return; }

        if (d.type === "log") log(d.message);

        if (d.type === "task_started") {
            log(`Process Live. PID: ${d.taskId}`);
            document.getElementById("taskIdInput").value = d.taskId;
        }

        if (d.type === "stopped") {
            log(`Link Terminated for PID: ${d.taskId}`);
        }

        if (d.type === "monitor_data") {
            const h = Math.floor(d.uptime / 3600);
            const m = Math.floor((d.uptime % 3600) / 60);
            const s = d.uptime % 60;
            document.getElementById("uptimeValue").textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            document.getElementById("activeTasks").textContent = d.activeTasks;
            document.getElementById("sent").textContent = d.totalSent;
        }
    };
}

setInterval(() => {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "ping" }));
}, 25000);
